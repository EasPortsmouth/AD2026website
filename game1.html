<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DEFLECTOR EVOLVED</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; position: fixed; 
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui {
            position: absolute; top: env(safe-area-inset-top, 20px); 
            width: 100%; text-align: center; color: #00f2fe; 
            pointer-events: none; text-shadow: 0 0 15px #00f2fe;
            font-family: 'Segoe UI', sans-serif; z-index: 10;
        }
        .top-stats { display: flex; justify-content: space-between; padding: 0 25px; font-size: 12px; letter-spacing: 2px; }
        .score { font-size: 60px; font-weight: 900; margin-top: -5px; }
        #msg { font-size: 24px; font-weight: bold; color: #ff0057; text-shadow: 0 0 10px #ff0057; text-transform: uppercase; }
        #best { color: #ffeb3b; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="top-stats">
            <div id="lvlName">FAZA: Začetek</div>
            <div>REKORD: <span id="best">0</span></div>
        </div>
        <div class="score" id="scoreVal">0</div>
        <div id="msg"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreVal');
        const bestDisplay = document.getElementById('best');
        const msgDisplay = document.getElementById('msg');
        const lvlDisplay = document.getElementById('lvlName');

        let highScore = localStorage.getItem('neonHighScore') || 0;
        bestDisplay.innerText = highScore;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let score = 0;
        let balls = [];
        let particles = [];
        let gameRunning = false;
        let paddle = { x: canvas.width / 2, y: canvas.height / 2, radius: 55 };
        let shake = 0;

        // Configuration
        const START_RADIUS = 25; // Nice and big
        const MIN_RADIUS = 7;    // Tiny but visible

        function initBall(speedMult = 1) {
            return {
                x: canvas.width / 2,
                y: 150,
                radius: START_RADIUS,
                dx: (Math.random() - 0.5) * 10 * speedMult,
                dy: 6 * speedMult,
                color: '#00f2fe',
                history: []
            };
        }

        function startCountdown() {
            let count = 3;
            balls = [];
            score = 0;
            scoreDisplay.innerText = 0;
            msgDisplay.innerText = "PRIPRAVLJENI?";
            const timer = setInterval(() => {
                count--;
                if (count > 0) msgDisplay.innerText = count;
                else {
                    msgDisplay.innerText = "Gremo!";
                    setTimeout(() => msgDisplay.innerText = "", 800);
                    balls.push(initBall(1.1));
                    gameRunning = true;
                    clearInterval(timer);
                }
            }, 1000);
        }

        function update() {
            if (!gameRunning) return;

            // Calculate current radius based on score
            // Drops by 3px every 10 points until it hits MIN_RADIUS
            let currentRadius = Math.max(MIN_RADIUS, START_RADIUS - (Math.floor(score / 10) * 3.5));

            balls.forEach((ball, bIdx) => {
                ball.radius = currentRadius;
                ball.history.push({x: ball.x, y: ball.y});
                if(ball.history.length > 6) ball.history.shift();

                ball.x += ball.dx;
                ball.y += ball.dy;

                // Wall bounce
                if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                    ball.dx *= -1.02;
                    ball.x = ball.x < ball.radius ? ball.radius : canvas.width - ball.radius;
                }
                if (ball.y - ball.radius < 0) {
                    ball.dy *= -1;
                    ball.y = ball.radius;
                }

                // Paddle Collision
                let dist = Math.hypot(ball.x - paddle.x, ball.y - paddle.y);
                if (dist < ball.radius + paddle.radius) {
                    ball.dy = -Math.abs(ball.dy) - 0.2;
                    ball.dx += (ball.x - paddle.x) * 0.2;
                    score++;
                    scoreDisplay.innerText = score;
                    shake = 10;
                    ball.color = `hsl(${Math.random() * 360}, 100%, 60%)`;

                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('neonHighScore', highScore);
                        bestDisplay.innerText = highScore;
                    }

                    // Milestone Logic
                    if (score % 10 === 0) {
                        msgDisplay.innerText = "ZMANJŠEVANJE!";
                        setTimeout(() => { if(gameRunning) msgDisplay.innerText = ""; }, 1000);
                    }

                    if (score === 50 && balls.length === 1) {
                        lvlDisplay.innerText = "FAZA: DVOJNA MOČ";
                        balls.push(initBall(1.2));
                    }
                }

                if (ball.y - ball.radius > canvas.height) {
                    balls.splice(bIdx, 1);
                    if (balls.length === 0) {
                        gameRunning = false;
                        msgDisplay.innerText = "FAZA UNIČENA - POTRUDI SE";
                        lvlDisplay.innerText = "FAZA: ZAČETEK";
                        setTimeout(startCountdown, 2000);
                    }
                }
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            if (shake > 0) {
                ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
                shake *= 0.85;
            }

            // Paddle Visual
            ctx.strokeStyle = gameRunning ? '#00f2fe' : '#333';
            ctx.lineWidth = 2;
            ctx.shadowBlur = gameRunning ? 10 : 0;
            ctx.shadowColor = '#00f2fe';
            ctx.beginPath();
            ctx.arc(paddle.x, paddle.y, paddle.radius, 0, Math.PI * 2);
            ctx.stroke();

            // Balls Visual
            balls.forEach(ball => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = ball.color;
                ctx.fillStyle = ball.color;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.restore();
            update();
            requestAnimationFrame(draw);
        }

        const handleMove = (e) => {
            const touch = e.touches ? e.touches[0] : e;
            paddle.x = touch.clientX;
            paddle.y = touch.clientY;
            e.preventDefault();
        };

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, {passive: false});

        startCountdown();
        draw();
    </script>
</body>
</html>
