<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kebab Majster: Day & Night</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap');
        
        body { margin: 0; background: #1a1a1a; font-family: 'Montserrat', sans-serif; overflow: hidden; touch-action: none; height: 100dvh; }
        #game-container { display: flex; flex-direction: column; height: 100dvh; width: 100%; position: relative; }

        /* Top View with Day/Night Transition */
        #street-view { 
            flex: 0.35; background: #87CEEB; /* Initial Day Color */
            position: relative; display: flex; justify-content: center; align-items: flex-end;
            border-bottom: 5px solid #333; transition: background 2s ease;
        }
        #customer { width: 85px; height: 120px; background: #ffdbac; border-radius: 20px 20px 0 0; position: relative; transition: transform 0.4s; }
        #bubble { position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%); background: white; padding: 8px; border-radius: 12px; width: 200px; text-align: center; font-size: 12px; border: 3px solid #333; z-index: 50; font-weight: 700; }

        /* HUD */
        #timer-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: rgba(0,0,0,0.2); }
        #timer-bar { width: 100%; height: 100%; background: #2ecc71; }
        #day-timer { position: absolute; top: 10px; right: 10px; color: white; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 20px; font-size: 12px; }

        /* Stats Modal */
        #stats-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 5px solid #333; padding: 20px; border-radius: 20px;
            width: 260px; text-align: center; z-index: 200; display: none;
        }
        #stats-modal h2 { margin-top: 0; color: #2ecc71; }
        #stats-modal button { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 800; margin-top: 15px; }

        /* Workstation (Same as before but adjusted for mobile) */
        #workstation { flex: 0.65; background: #e0e0e0; position: relative; display: flex; flex-direction: column; }
        #prep-layout { display: flex; flex: 1; padding: 45px 5px 5px 5px; gap: 5px; justify-content: space-around; }
        #meat-station { width: 80px; display: flex; flex-direction: column; align-items: center; position: relative; }
        #meat-block { width: 45px; height: 80px; background: #8b4513; border-radius: 6px; margin-top: 10px; border: 2px solid #5d2e0a; }
        #slicer { font-size: 30px; position: absolute; top: -5px; right: -15px; z-index: 20; }
        #main-prep { flex: 1; display: flex; align-items: center; justify-content: center; }
        #kebab-base { width: 110px; height: 140px; background: #f4d03f; border-radius: 10px 10px 60px 60px; border: 4px solid #d4ac0d; display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 8px; }
        #fries-station { width: 80px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #fryer { width: 65px; height: 65px; background: #7f8c8d; border: 3px solid #34495e; border-radius: 8px; position: relative; overflow: hidden; }
        .oil { position: absolute; bottom: 0; width: 100%; height: 0%; background: rgba(241, 196, 15, 0.6); transition: height 3s linear; }

        #shelf { height: 80px; background: #ccc; display: flex; justify-content: space-around; align-items: center; border-top: 4px solid #999; }
        .source-item { font-size: 34px; touch-action: none; position: relative; }
        #meat-tag { position: absolute; top: -10px; right: -10px; background: #e67e22; color: white; font-size: 10px; padding: 1px 4px; border-radius: 5px; }
        .dragged-item { position: absolute; font-size: 40px; pointer-events: none; z-index: 100; }
        .kebab-layer { font-size: 30px; margin-bottom: -22px; }

        #serve-btn { position: absolute; right: 8px; top: 8px; background: #2ecc71; color: white; padding: 8px; border-radius: 8px; font-weight: 800; font-size: 11px; border:none; }
        #trash-btn { position: absolute; left: 8px; top: 8px; background: #e74c3c; color: white; padding: 8px; border-radius: 8px; font-size: 11px; border:none; }

        .jump { animation: jumpAnim 0.5s ease; }
        .shake { animation: shakeAnim 0.5s ease; }
        @keyframes jumpAnim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-40px); } }
        @keyframes shakeAnim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 75% { transform: translateX(15px); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="street-view">
        <div id="timer-container"><div id="timer-bar"></div></div>
        <div id="day-timer">Čas: <span id="clock">12:00</span></div>
        <div id="bubble">Dobrodošli!</div>
        <div id="customer"></div>
    </div>

    <div id="stats-modal">
        <h2>DNEVNO POROČILO</h2>
        <p>Prodani kebabi: <b id="stat-sold">0</b></p>
        <p>Nezadovoljne stranke: <b id="stat-missed">0</b></p>
        <p>Zaslužek: <b id="stat-money">0</b> €</p>
        <button onclick="restartDay()">NASLEDNJI DAN</button>
    </div>

    <div id="workstation">
        <button id="trash-btn">IZBRIŠI</button>
        <button id="serve-btn">POSTREŽI!</button>
        <div id="prep-layout">
            <div id="meat-station"><div id="meat-block"></div><div id="slicer">🔪</div></div>
            <div id="main-prep"><div id="kebab-base"></div></div>
            <div id="fries-station"><div id="pot-src" data-type="Krompir">🥔</div><div id="fryer">🍟<div class="oil" id="oil-v"></div></div></div>
        </div>
        <div id="shelf">
            <div class="source-item" data-type="Meso">🥩<span id="meat-tag">0/3</span></div>
            <div class="source-item" data-type="Solata">🥬</div>
            <div class="source-item" data-type="Paradižnik">🍅</div>
            <div class="source-item" data-type="Čebula">🧅</div>
            <div class="source-item" data-type="Pekoče">🌶️</div>
            <div class="source-item" id="f-ready" data-type="Pomfri" style="opacity:0.2">🍟</div>
        </div>
    </div>
</div>

<script>
    const street = document.getElementById('street-view'), clock = document.getElementById('clock'), modal = document.getElementById('stats-modal');
    const timerBar = document.getElementById('timer-bar'), kebabBase = document.getElementById('kebab-base'), customer = document.getElementById('customer');
    const meatTag = document.getElementById('meat-tag'), friesReady = document.getElementById('f-ready');

    let playerKebab = [], currentOrder = [], meatStock = 0, sliceCount = 0, isFrying = false;
    let dayProgress = 0, gameActive = true;
    let stats = { sold: 0, missed: 0, money: 0 };
    let patienceInterval, dayInterval;

    function updateDayCycle() {
        dayProgress++;
        let hour = 12 + Math.floor(dayProgress / 10);
        clock.innerText = `${hour}:00`;

        // Background transition
        if (hour >= 17) street.style.background = "#FF8C00"; // Sunset
        if (hour >= 20) street.style.background = "#2c3e50"; // Night
        
        if (hour >= 22) {
            endDay();
        }
    }

    function endDay() {
        gameActive = false;
        clearInterval(dayInterval);
        clearInterval(patienceInterval);
        document.getElementById('stat-sold').innerText = stats.sold;
        document.getElementById('stat-missed').innerText = stats.missed;
        document.getElementById('stat-money').innerText = stats.sold * 6; // 6€ per kebab
        modal.style.display = "block";
    }

    function restartDay() {
        dayProgress = 0; stats = { sold: 0, missed: 0, money: 0 };
        gameActive = true;
        street.style.background = "#87CEEB";
        modal.style.display = "none";
        dayInterval = setInterval(updateDayCycle, 1000);
        nextCustomer();
    }

    function startPatience(sec) {
        clearInterval(patienceInterval);
        let p = 100; const step = 100 / (sec * 10);
        patienceInterval = setInterval(() => {
            p -= step;
            timerBar.style.width = p + "%";
            if (p <= 0) {
                clearInterval(patienceInterval);
                stats.missed++;
                nextCustomer();
            }
        }, 100);
    }

    function nextCustomer() {
        if (!gameActive) return;
        playerKebab = []; kebabBase.innerHTML = "";
        customer.classList.remove('jump', 'shake');
        customer.style.transform = "translateX(400px)";
        setTimeout(() => {
            const reqs = [
                { t: "Enega z vsem!", r: ["Meso", "Solata", "Paradižnik", "Čebula", "Pekoče"], s: 20 },
                { t: "Samo meso in pomfri.", r: ["Meso", "Pomfri"], s: 15 },
                { t: "Brez čebule, dodaj pomfri!", r: ["Meso", "Solata", "Paradižnik", "Pomfri"], s: 18 }
            ];
            const r = reqs[Math.floor(Math.random() * reqs.length)];
            currentOrder = r.r; document.getElementById('bubble').innerText = r.t;
            customer.style.transform = "translateX(0px)";
            startPatience(r.s);
        }, 600);
    }

    // Slicing and Dragging (Compressed from previous version)
    let sO = 0, lastD = null;
    const slicer = document.getElementById('slicer');
    slicer.addEventListener('touchstart', (e) => sO = e.touches[0].clientY);
    slicer.addEventListener('touchmove', (e) => {
        let dy = e.touches[0].clientY - sO; slicer.style.transform = `translateY(${dy}px)`;
        let d = dy > 0 ? 'd' : 'u';
        if (Math.abs(dy) > 10 && lastD !== d) {
            lastD = d; if (meatStock < 3) { sliceCount++; if(sliceCount >= 5) { meatStock++; sliceCount=0; meatTag.innerText=`${meatStock}/3`; }}
        }
    });
    slicer.addEventListener('touchend', () => { slicer.style.transform = "translateY(0)"; lastD = null; });

    let activeDrag = null;
    document.querySelectorAll('.source-item, #pot-src').forEach(item => {
        item.addEventListener('touchstart', (e) => {
            if (!gameActive || (item.dataset.type === "Meso" && meatStock <= 0) || (item.id === "f-ready" && item.style.opacity < 1)) return;
            const t = e.touches[0];
            activeDrag = { el: item.cloneNode(true), type: item.dataset.type, emoji: item.innerText.split('0')[0].trim() };
            activeDrag.el.classList.add('dragged-item');
            document.body.appendChild(activeDrag.el);
            activeDrag.el.style.left = (t.clientX - 20) + 'px'; activeDrag.el.style.top = (t.clientY - 20) + 'px';
        });
    });

    window.addEventListener('touchmove', (e) => { if(activeDrag) { activeDrag.el.style.left = (e.touches[0].clientX - 20) + 'px'; activeDrag.el.style.top = (e.touches[0].clientY - 20) + 'px'; }});

    window.addEventListener('touchend', (e) => {
        if (!activeDrag) return;
        const t = e.changedTouches[0], kR = kebabBase.getBoundingClientRect(), fR = document.getElementById('fryer').getBoundingClientRect();
        if (t.clientX > kR.left && t.clientX < kR.right && t.clientY > kR.top && t.clientY < kR.bottom) {
            if (activeDrag.type !== "Krompir") {
                if (activeDrag.type === "Meso") { meatStock--; meatTag.innerText=`${meatStock}/3`; }
                if (activeDrag.type === "Pomfri") friesReady.style.opacity = 0.2;
                playerKebab.push(activeDrag.type);
                let l = document.createElement('div'); l.className = 'kebab-layer'; l.innerText = activeDrag.emoji;
                kebabBase.appendChild(l);
            }
        }
        if (activeDrag.type === "Krompir" && t.clientX > fR.left && t.clientX < fR.right && t.clientY > fR.top && t.clientY < fR.bottom) {
            if (!isFrying) { isFrying = true; document.getElementById('oil-v').style.height = "100%"; setTimeout(() => { isFrying = false; document.getElementById('oil-v').style.height = "0%"; friesReady.style.opacity = 1; }, 3000); }
        }
        document.body.removeChild(activeDrag.el); activeDrag = null;
    });

    document.getElementById('serve-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        clearInterval(patienceInterval);
        const oT = {}, pT = {};
        currentOrder.forEach(i => oT[i] = (oT[i]||0)+1);
        playerKebab.forEach(i => pT[i] = (pT[i]||0)+1);
        let res = "perfect";
        const keys = new Set([...Object.keys(oT), ...Object.keys(pT)]);
        for (let k of keys) { if ((pT[k]||0) !== (oT[k]||0)) res = "wrong"; }
        
        if (res === "perfect") { stats.sold++; customer.classList.add('jump'); } 
        else { stats.missed++; customer.classList.add('shake'); }
        setTimeout(nextCustomer, 1500);
    });

    document.getElementById('trash-btn').addEventListener('touchstart', (e) => { e.preventDefault(); playerKebab = []; kebabBase.innerHTML = ""; });

    restartDay();
</script>
</body>
</html>
