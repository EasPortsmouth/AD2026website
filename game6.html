<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kebab Majster: Final Logic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap');
        
        body { margin: 0; background: #1a1a1a; font-family: 'Montserrat', sans-serif; overflow: hidden; touch-action: none; height: 100dvh; }
        #game-container { display: flex; flex-direction: column; height: 100dvh; width: 100%; position: relative; }

        #street-view { 
            flex: 0.35; background: #87CEEB; 
            position: relative; display: flex; justify-content: center; align-items: flex-end;
            border-bottom: 5px solid #333; transition: background 3s ease;
        }

        /* CUSTOMER */
        #customer { 
            width: 85px; height: 120px; border-radius: 20px 20px 0 0; 
            position: relative; transition: transform 0.4s;
            display: flex; flex-direction: column; align-items: center; padding-top: 20px;
        }
        .eye { width: 8px; height: 8px; background: #333; border-radius: 50%; position: absolute; top: 30px; }
        .eye.left { left: 25px; } .eye.right { right: 25px; }
        #mouth { width: 30px; height: 4px; background: #333; border-radius: 2px; position: absolute; top: 55px; }

        #bubble { position: absolute; bottom: 135px; left: 50%; transform: translateX(-50%); background: white; padding: 10px; border-radius: 15px; width: 220px; text-align: center; font-size: 13px; border: 3px solid #333; z-index: 50; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        #timer-container { position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: rgba(0,0,0,0.15); display: none; }
        #timer-bar { width: 100%; height: 100%; background: #2ecc71; }
        #day-timer { position: absolute; top: 12px; right: 12px; color: white; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 800; }

        #stats-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 6px solid #333; padding: 25px; border-radius: 25px;
            width: 280px; text-align: center; z-index: 200; display: none;
        }

        /* WORKSTATION */
        #workstation { flex: 0.65; background: #e0e0e0; position: relative; display: flex; flex-direction: column; }
        #prep-layout { display: flex; flex: 1; padding: 45px 5px 5px 5px; gap: 5px; justify-content: space-around; }
        
        #meat-station { width: 70px; display: flex; flex-direction: column; align-items: center; position: relative; }
        #meat-block { width: 45px; height: 85px; background: #8b4513; border-radius: 8px; margin-top: 10px; border: 2px solid #5d2e0a; }
        #slicer { font-size: 30px; position: absolute; top: -5px; right: -15px; z-index: 20; }
        
        #main-prep { flex: 1; display: flex; align-items: center; justify-content: center; }
        #kebab-base { width: 110px; height: 150px; background: #f4d03f; border-radius: 10px 10px 60px 60px; border: 4px solid #d4ac0d; display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 8px; position: relative; }
        #drink-slot { position: absolute; right: -45px; bottom: 5px; font-size: 40px; }

        #fries-station { width: 70px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        #fryer { width: 60px; height: 60px; background: #7f8c8d; border: 3px solid #34495e; border-radius: 8px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 24px;}
        .oil { position: absolute; bottom: 0; width: 100%; height: 0%; background: rgba(241, 196, 15, 0.7); transition: height 3s linear; }

        #fridge { width: 65px; display: flex; flex-direction: column; align-items: center; gap: 8px; border-left: 2px solid #bbb; padding-left: 5px; }
        .drink-src { font-size: 32px; touch-action: none; }

        #shelf { height: 85px; background: #ccc; display: flex; justify-content: space-around; align-items: center; border-top: 4px solid #999; padding-bottom: 5px; }
        .source-item { font-size: 34px; touch-action: none; position: relative; }
        #meat-tag { position: absolute; top: -10px; right: -10px; background: #e67e22; color: white; font-size: 10px; padding: 2px 5px; border-radius: 8px; font-weight: 800; }
        
        .dragged-item { position: absolute; font-size: 45px; pointer-events: none; z-index: 100; }
        .kebab-layer { font-size: 32px; margin-bottom: -24px; user-select: none; }

        #serve-btn { position: absolute; right: 8px; top: 8px; background: #2ecc71; color: white; padding: 8px 12px; border-radius: 8px; font-weight: 800; font-size: 11px; border:none; box-shadow: 0 4px 0 #27ae60; }
        #trash-btn { position: absolute; left: 8px; top: 8px; background: #e74c3c; color: white; padding: 8px 12px; border-radius: 8px; font-size: 11px; border:none; box-shadow: 0 4px 0 #c0392b; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="street-view">
        <div id="timer-container"><div id="timer-bar"></div></div>
        <div id="day-timer">Čas: <span id="clock">10:00</span></div>
        <div id="bubble">Dobrodošli!</div>
        <div id="customer"><div class="eye left"></div><div class="eye right"></div><div id="mouth"></div></div>
    </div>

    <div id="stats-modal">
        <h2>KONEC DELAVNIKA</h2>
        <p>Prodani kebabi: <b id="stat-sold">0</b></p>
        <p>Zamujene stranke: <b id="stat-missed">0</b></p>
        <p>Zaslužek: <b id="stat-money">0</b> €</p>
        <button onclick="restartDay()">NASLEDNJI DAN</button>
    </div>

    <div id="workstation">
        <button id="trash-btn">IZBRIŠI</button>
        <button id="serve-btn">POSTREŽI!</button>
        <div id="prep-layout">
            <div id="meat-station"><div id="meat-block"></div><div id="slicer">🔪</div></div>
            <div id="main-prep">
                <div id="kebab-base"><div id="drink-slot"></div></div>
            </div>
            <div id="fries-station"><div id="pot-src" data-type="Pomfri">🥔</div><div id="fryer">🍟<div class="oil" id="oil-v"></div></div></div>
            <div id="fridge">
                <div class="drink-src" data-type="Voda">💧</div>
                <div class="drink-src" data-type="Sok">🥤</div>
            </div>
        </div>
        <div id="shelf">
            <div class="source-item" data-type="Meso">🥩<span id="meat-tag">0/3</span></div>
            <div class="source-item" data-type="Solata">🥬</div>
            <div class="source-item" data-type="Paradižnik">🍅</div>
            <div class="source-item" data-type="Čebula">🧅</div>
            <div class="source-item" data-type="Pekoče">🌶️</div>
            <div class="source-item" id="f-ready" data-type="PomfriReady" style="opacity:0.2">🍟</div>
        </div>
    </div>
</div>

<script>
    const street = document.getElementById('street-view'), clock = document.getElementById('clock'), modal = document.getElementById('stats-modal');
    const timerCont = document.getElementById('timer-container'), timerBar = document.getElementById('timer-bar'), kebabBase = document.getElementById('kebab-base');
    const customer = document.getElementById('customer'), mouth = document.getElementById('mouth'), meatTag = document.getElementById('meat-tag'), friesReady = document.getElementById('f-ready'), drinkSlot = document.getElementById('drink-slot');

    let playerItems = [], currentOrder = [], meatStock = 0, sliceCount = 0, isFrying = false;
    let dayProgress = 0, gameActive = true, stats = { sold: 0, missed: 0, money: 0 };
    let patienceInterval, dayInterval;

    const colors = ["#ffdbac", "#f1c27d", "#e0ac69", "#8d5524", "#c68642", "#FFAD60", "#FFEEAD", "#D1E8E2"];

    function updateDayCycle() {
        dayProgress++;
        let hour = 10 + Math.floor(dayProgress / 20); 
        clock.innerText = `${hour}:00`;
        if (hour >= 18) street.style.background = "#FF7F50";
        if (hour >= 21) street.style.background = "#2c3e50";
        if (hour >= 23) endDay();
    }

    function endDay() {
        gameActive = false; clearInterval(dayInterval); clearInterval(patienceInterval);
        document.getElementById('stat-sold').innerText = stats.sold;
        document.getElementById('stat-missed').innerText = stats.missed;
        document.getElementById('stat-money').innerText = stats.sold * 7;
        modal.style.display = "block";
    }

    function restartDay() {
        dayProgress = 0; stats = { sold: 0, missed: 0, money: 0 };
        gameActive = true; street.style.background = "#87CEEB";
        modal.style.display = "none";
        dayInterval = setInterval(updateDayCycle, 1000);
        nextCustomer();
    }

    function startPatience(sec) {
        clearInterval(patienceInterval);
        if (sec === 0) { timerCont.style.display = "none"; return; }
        timerCont.style.display = "block";
        let p = 100; const step = 100 / (sec * 10);
        patienceInterval = setInterval(() => {
            p -= step; timerBar.style.width = p + "%";
            if (p <= 0) { clearInterval(patienceInterval); stats.missed++; nextCustomer(); }
        }, 100);
    }

    function nextCustomer() {
        if (!gameActive) return;
        playerItems = []; kebabBase.innerHTML = '<div id="drink-slot"></div>';
        customer.classList.remove('jump', 'shake'); customer.style.transform = "translateX(400px)";
        mouth.style.height = "4px"; mouth.style.borderRadius = "2px";

        setTimeout(() => {
            customer.style.background = colors[Math.floor(Math.random() * colors.length)];
            const isRelaxed = Math.random() < 0.2;
            const menu = [
                { t: "Enega z vsem in vodo!", r: ["Meso", "Solata", "Paradižnik", "Čebula", "Pekoče", "Voda"], s: 30 },
                { t: "Kebab s pomfrijem in sok.", r: ["Meso", "Pomfri", "Sok"], s: 25 },
                { t: "Samo meso in voda.", r: ["Meso", "Voda"], s: 15 },
                { t: "Kebab z vsem, brez pijače.", r: ["Meso", "Solata", "Paradižnik", "Čebula", "Pekoče"], s: 25 },
                { t: "Samo pomfri in sok.", r: ["Pomfri", "Sok"], s: 15 }
            ];
            const r = menu[Math.floor(Math.random() * menu.length)];
            currentOrder = [...r.r]; // Clone order
            document.getElementById('bubble').innerText = r.t + (isRelaxed ? " Počasi." : "");
            customer.style.transform = "translateX(0px)";
            startPatience(isRelaxed ? 0 : r.s);
        }, 600);
    }

    // SLICING
    let sO = 0, lastD = null;
    document.getElementById('slicer').addEventListener('touchstart', (e) => sO = e.touches[0].clientY);
    document.getElementById('slicer').addEventListener('touchmove', (e) => {
        let dy = e.touches[0].clientY - sO; document.getElementById('slicer').style.transform = `translateY(${dy}px)`;
        let d = dy > 0 ? 'd' : 'u';
        if (Math.abs(dy) > 10 && lastD !== d) {
            lastD = d; if (meatStock < 3) { sliceCount++; if(sliceCount >= 5) { meatStock++; sliceCount=0; meatTag.innerText=`${meatStock}/3`; }}
        }
    });
    document.getElementById('slicer').addEventListener('touchend', () => { document.getElementById('slicer').style.transform = "translateY(0)"; lastD = null; });

    // DRAGGING
    let activeDrag = null;
    document.body.addEventListener('touchstart', (e) => {
        const item = e.target.closest('.source-item, #pot-src, .drink-src');
        if (!item || !gameActive) return;
        if (item.dataset.type === "Meso" && meatStock <= 0) return;
        if (item.dataset.type === "PomfriReady" && item.style.opacity < 1) return;

        const t = e.touches[0];
        activeDrag = { el: item.cloneNode(true), type: item.dataset.type, emoji: item.innerText.split('0')[0].trim() };
        activeDrag.el.classList.add('dragged-item');
        document.body.appendChild(activeDrag.el);
    });

    window.addEventListener('touchmove', (e) => { if(activeDrag) { activeDrag.el.style.left = (e.touches[0].clientX - 20) + 'px'; activeDrag.el.style.top = (e.touches[0].clientY - 20) + 'px'; }});

    window.addEventListener('touchend', (e) => {
        if (!activeDrag) return;
        const t = e.changedTouches[0], kR = kebabBase.getBoundingClientRect(), fR = document.getElementById('fryer').getBoundingClientRect();
        
        if (t.clientX > kR.left - 40 && t.clientX < kR.right + 40 && t.clientY > kR.top && t.clientY < kR.bottom) {
            if (activeDrag.type === "Pomfri") return; // Raw potato can't go to kebab
            
            let finalType = activeDrag.type;
            if (finalType === "PomfriReady") {
                finalType = "Pomfri";
                document.getElementById('f-ready').style.opacity = 0.2;
            }
            if (finalType === "Meso") { meatStock--; meatTag.innerText=`${meatStock}/3`; }
            
            playerItems.push(finalType);
            
            if (finalType === "Voda" || finalType === "Sok") {
                document.getElementById('drink-slot').innerText = activeDrag.emoji;
            } else {
                let l = document.createElement('div'); l.className = 'kebab-layer'; l.innerText = activeDrag.emoji;
                kebabBase.appendChild(l);
            }
        } else if (activeDrag.type === "Pomfri" && t.clientX > fR.left && t.clientX < fR.right && t.clientY > fR.top && t.clientY < fR.bottom) {
            if (!isFrying) { isFrying = true; document.getElementById('oil-v').style.height = "100%"; setTimeout(() => { isFrying = false; document.getElementById('oil-v').style.height = "0%"; document.getElementById('f-ready').style.opacity = 1; }, 3000); }
        }
        document.body.removeChild(activeDrag.el); activeDrag = null;
    });

    function serve() {
        clearInterval(patienceInterval);
        
        // BETTER VALIDATION: Sort and compare strings
        const pSorted = [...playerItems].sort().join(',');
        const oSorted = [...currentOrder].sort().join(',');
        
        if (pSorted === oSorted) { 
            stats.sold++; mouth.style.height = "10px"; mouth.style.borderRadius = "0 0 15px 15px"; customer.classList.add('jump'); 
            document.getElementById('bubble').innerText = "Točno to! Hvala!";
        } else { 
            stats.missed++; mouth.style.height = "10px"; mouth.style.borderRadius = "15px 15px 0 0"; customer.classList.add('shake'); 
            document.getElementById('bubble').innerText = "Pozabil si nekaj!";
        }
        setTimeout(nextCustomer, 1500);
    }

    document.getElementById('serve-btn').addEventListener('touchstart', (e) => { e.preventDefault(); serve(); });
    document.getElementById('trash-btn').addEventListener('touchstart', (e) => { e.preventDefault(); playerItems = []; kebabBase.innerHTML = '<div id="drink-slot"></div>'; });

    restartDay();
</script>
</body>
</html>
