<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Be a Manager 2026</title>
    <style>
        :root {
            --cm-dark: #00332c;
            --cm-green: #004d40;
            --cm-light-green: #00695c;
            --cm-gold: #ffcc00;
            --cm-border: #777;
        }

        body {
            background-color: #111;
            color: var(--cm-gold);
            font-family: "Tahoma", "Geneva", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            width: 1024px;
            height: 700px;
            background-color: var(--cm-green);
            border: 3px outset var(--cm-border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        #header {
            background: linear-gradient(to bottom, #333, #111);
            color: #fff;
            padding: 4px 12px;
            font-size: 11px;
            border-bottom: 2px solid var(--cm-gold);
            display: flex;
            justify-content: space-between;
        }

        #main-layout {
            display: flex;
            flex-grow: 1;
        }

        /* Sidebar */
        #sidebar {
            width: 150px;
            background-color: var(--cm-dark);
            border-right: 2px solid var(--cm-gold);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu-btn {
            background: var(--cm-light-green);
            color: #fff;
            border: 1px outset #aaa;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .menu-btn:hover {
            background: var(--cm-gold);
            color: var(--cm-dark);
        }

        /* Content Area */
        #content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        #title-banner {
            background: #002b25;
            padding: 30px;
            border-bottom: 1px solid var(--cm-gold);
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 50px;
            font-style: italic;
            text-shadow: 3px 3px #000;
        }

        /* Facts / Dashboard Section */
        #dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
        }

        .panel {
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--cm-gold);
            height: 200px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: var(--cm-dark);
            padding: 5px 10px;
            font-size: 12px;
            font-weight: bold;
            border-bottom: 1px solid var(--cm-gold);
        }

        .fact-box {
            padding: 20px;
            font-size: 16px;
            color: white;
            line-height: 1.5;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        /* Footer */
        #footer {
            background: var(--cm-dark);
            border-top: 1px solid var(--cm-gold);
            padding: 5px 15px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="header">
            <span>BE A MANAGER 2026</span>
            <span id="clock">12:00</span>
        </div>

        <div id="main-layout">
            <div id="sidebar">
                <a href="#" class="menu-btn" onclick="startGame()">NEW GAME</a>
                <a href="#" class="menu-btn">RESTORE GAME</a>
            </div>

            <div id="content">
                <div id="title-banner">
                    <h1>BE A MANAGER 2026</h1>
                    <div style="font-size: 14px; margin-top: 5px; color: #fff;">THE ULTIMATE SIMULATION</div>
                </div>

                <div id="dashboard">
                    <div class="panel">
                        <div class="panel-header">DID YOU KNOW?</div>
                        <div id="fact-display" class="fact-box">
                            Loading football trivia...
                        </div>
                    </div>

                    <div class="panel">
                        <div class="panel-header">PREVIOUS CHAMPIONS</div>
                        <div style="padding: 10px; color: #fff; font-size: 12px;">
                            <div style="display:flex; justify-content:space-between; padding:4px 0;"><span>2024/25 Champions:</span> <span>Manchester City</span></div>
                            <div style="display:flex; justify-content:space-between; padding:4px 0;"><span>Champions League:</span> <span>Real Madrid</span></div>
                            <div style="display:flex; justify-content:space-between; padding:4px 0;"><span>World Cup 2022:</span> <span>Argentina</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="footer">
            <span id="date-display">Monday 9th February 2026</span>
            <span>v1.0.4-BETA</span>
        </div>
    </div>

    <script>
        // Fun Facts Presets
        const facts = [
            "Dundee United has a 100% win record against FC Barcelona. They played 4 times and won all 4.",
            "Gary Lineker played his entire professional career without ever receiving a yellow or red card.",
            "The first World Cup in 1930 was played entirely in one city: Montevideo, Uruguay.",
            "Giuseppe Bergomi played in 4 World Cups for Italy but never played in a single qualifying match.",
            "Norway is the only national team in the world to have never lost against Brazil (2 wins, 2 draws).",
            "Rio Ferdinand is the only player to have scored a Premier League goal under 7 different managers."
        ];

        let factIndex = 0;
        function rotateFact() {
            const display = document.getElementById('fact-display');
            display.innerText = facts[factIndex];
            factIndex = (factIndex + 1) % facts.length;
        }

        // Initial call and set interval
        rotateFact();
        setInterval(rotateFact, 30000); // 30 seconds

        function startGame() {
            alert("Starting New Game... Initializing Database...");
            // We can add the navigation to the setup screen here next.
        }
    </script>
</body>
</html>
