<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Addictive Game Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --neon-cyan: #00f2fe;
            --neon-pink: #ff0057;
            --bg-dark: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Animated Background Grids */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 20s linear infinite;
            z-index: -1;
        }

        @keyframes moveGrid {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--neon-cyan), #fff, var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.5));
        }

        .description {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            line-height: 1.6;
            letter-spacing: 1px;
        }

        .menu-btns {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-btn {
            position: relative;
            padding: 18px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 2px;
            border-radius: 8px;
            transition: 0.3s all ease;
            overflow: hidden;
            border: none;
            cursor: pointer;
        }

        /* Button One: Cyan Theme */
        .btn-ping {
            background: rgba(0, 242, 254, 0.1);
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.2);
        }

        .btn-ping:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateY(-3px);
        }

        /* Button Two: Pink Theme */
        .btn-neon {
            background: rgba(255, 0, 87, 0.1);
            color: var(--neon-pink);
            border: 1px solid var(--neon-pink);
            box-shadow: inset 0 0 10px rgba(255, 0, 87, 0.2);
        }

        .btn-neon:hover {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 30px var(--neon-pink);
            transform: translateY(-3px);
        }

        .btn-ping:active, .btn-neon:active {
            transform: scale(0.95);
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Addictive Game Hub</h1>
        <p class="description">
            Dolgčas? Tu najdete nekaj arkadnih iger, ki so zagotovo zasvojljive in preproste za odganjanje dolgčasa. Avtor: Anes Dizdarević
        </p>

        <div class="menu-btns">
            <a href="game2.html" class="game-btn btn-ping">Ping Pong Classic</a>
            <a href="game1.html" class="game-btn btn-neon">Neon Deflector Game</a>
        </div>
    </div>

</body>
</html>
