<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Addictive Game Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --neon-cyan: #00f2fe;
            --neon-pink: #ff0057;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Orbitron', sans-serif;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Animated Background Grids */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 20s linear infinite;
            z-index: -1;
        }

        @keyframes moveGrid {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .container {
            display: flex;
            flex-direction: column;
            padding: 30px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            width: 90%;
            max-width: 450px;
            max-height: 85vh; /* Prevents container from leaving screen */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        /* Fixed Header Section */
        .header {
            flex-shrink: 0;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--neon-cyan), #fff, var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.5));
        }

        .description {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
        }

        /* SCROLLABLE AREA */
        .menu-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            margin-top: 10px;
            /* Hide scrollbar for Chrome/Safari but keep functionality */
            scrollbar-width: thin;
            scrollbar-color: var(--neon-cyan) transparent;
        }

        /* Custom Scrollbar for Chrome/Edge */
        .menu-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .menu-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .menu-scroll::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .menu-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 20px; /* Space at the bottom of scroll */
        }

        .game-btn {
            position: relative;
            padding: 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 2px;
            border-radius: 10px;
            transition: 0.3s all cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            border: none;
            cursor: pointer;
            text-align: center;
            display: block;
        }

        /* Cyan Theme */
        .btn-cyan {
            background: rgba(0, 242, 254, 0.05);
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 242, 254, 0.3);
        }

        .btn-cyan:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: scale(1.02);
        }

        /* Pink Theme */
        .btn-pink {
            background: rgba(255, 0, 87, 0.05);
            color: var(--neon-pink);
            border: 1px solid rgba(255, 0, 87, 0.3);
        }

        .btn-pink:hover {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 20px var(--neon-pink);
            transform: scale(1.02);
        }

        .game-btn:active {
            transform: scale(0.95);
        }

        /* Footer Credits */
        .footer {
            margin-top: 15px;
            font-size: 0.7rem;
            color: var(--neon-cyan);
            opacity: 0.7;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .container { width: 95%; padding: 20px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Arcade Hub</h1>
            <p class="description">
                Zbirka zasvojljivih iger za krajšanje časa.
            </p>
        </div>

        <div class="menu-scroll">
            <div class="menu-btns">
                <a href="game8.html" class="game-btn btn-pink">🛩️ Papirnato letalo</a>
                <a href="game7.html" class="game-btn btn-cyan">🔨 Zabijalec žebljev</a>
                <a href="game6.html" class="game-btn btn-pink">🥙 Kebab mojster</a>
                <a href="game1.html" class="game-btn btn-cyan">🎮 Neon Deflector</a>
                <a href="game2.html" class="game-btn btn-pink">🏓 Ping Pong</a>
                <a href="game3.html" class="game-btn btn-cyan">🏐 Odbojka</a>
                <a href="game4.html" class="game-btn btn-pink">🏃 Preskakovanje koze</a>
                <a href="game5.html" class="game-btn btn-cyan">⚽ Nogomet 2v2</a>
                </div>
        </div>

        <div class="footer">
            Avtor: Anes Dizdarević
        </div>
    </div>

</body>
</html>
