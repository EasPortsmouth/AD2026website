<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Be a Manager 2026</title>
    <style>
        body {
            background-color: #004d40; /* Classic CM Green */
            color: #ffcc00; /* Gold text */
            font-family: "Tahoma", "Geneva", sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Left Sidebar Navigation */
        #sidebar {
            width: 200px;
            background-color: #00332c;
            border-right: 2px solid #ffcc00;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-btn {
            background: #005b4f;
            color: white;
            border: 1px solid #ffcc00;
            padding: 10px;
            text-align: left;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 0.9em;
        }

        .menu-btn:hover {
            background: #ffcc00;
            color: #00332c;
        }

        /* Main Content Area */
        #main-stage {
            flex-grow: 1;
            padding: 40px;
            background: radial-gradient(circle, #00695c 0%, #004d40 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-shadow: 2px 2px #000;
        }

        h1 {
            font-size: 4em;
            margin-bottom: 0;
            letter-spacing: 2px;
            font-style: italic;
        }

        .version {
            font-size: 1.2em;
            margin-bottom: 50px;
        }

        .status-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #00332c;
            border-top: 1px solid #ffcc00;
            padding: 5px 20px;
            font-size: 0.8em;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <a href="#" class="menu-btn">NEW GAME</a>
        <a href="#" class="menu-btn">RESTORE GAME</a>
        <a href="#" class="menu-btn">GAME SETTINGS</a>
        <a href="#" class="menu-btn">EDITOR</a>
        <a href="#" class="menu-btn">CREDITS</a>
        <div style="margin-top: auto;">
            <a href="#" class="menu-btn" style="border-color: red; color: #ff9999;">EXIT</a>
        </div>
    </div>

    <div id="main-stage">
        <h1>BE A MANAGER</h1>
        <div class="version">2026 EDITION</div>
        
        <p style="color: white; text-shadow: none;">Select an option from the sidebar to begin your journey.</p>
    </div>

    <div class="status-bar">
        Sunday 8th February 2026 | No Game Loaded
    </div>

</body>
</html>
