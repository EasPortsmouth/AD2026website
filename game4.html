        let bgImage = new Image();
        let imgLoaded = false;
        bgImage.onload = () => { imgLoaded = true; };
        bgImage.src = IMAGE_DATA;

        let currentMessage = "Preskoči kozo da te lahko ocenim";
        const motivationalQuotes = [
            "Gremo, noge niso od betona!",
            "A ti to mamo kličeš al kaj?",
            "Če boš tko skakal, boš še v Planici!",
            "Ne glej slike, glej kozo!",
            "Tvoji refleksi so k mrzla pašta.",
            "Moja babi gre hitreje.",
            "Skok k sredi tedna - nikakršn.",
            "Lepo, zdej pa še mal gasa!",
            "Kaj je to? Gimnastika al spanje?",
            "Umakni se kozi, ne bodi koza!"
        ];

        let dino = { x: 50, y: 0, w: 30, h: 30, dy: 0, jumpForce: -11.5, grounded: false };
        let obstacles = [];
        hiScoreEl.innerText = `HI ${String(highScore).padStart(5, '0')}`;

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            dino.y = canvas.height * groundY - dino.h;
        }
        window.addEventListener('resize', resize); resize();

        function spawnObstacle() {
            let obs = { x: canvas.width + 50, y: canvas.height * groundY, w: 40, h: 30 + Math.random() * 15, color: "#8B4513" };
            obs.y -= obs.h; obstacles.push(obs);
        }

        function jump() { if (dino.grounded && gameActive) { dino.dy = dino.jumpForce; dino.grounded = false; } }
        document.getElementById("jump-trigger").addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        window.addEventListener('keydown', (e) => { if(e.code === "Space") jump(); });
        
        startBtn.addEventListener('click', () => { 
            gameActive = true; score = 0; gameSpeed = 5.5; obstacles = []; dino.dy = 0; frameCount = 0; 
            currentMessage = "Preskoči kozo da te lahko ocenim"; 
            overlay.style.display = "none"; 
            requestAnimationFrame(update); 
        });

        function gameOver() {
            gameActive = false; overlay.style.display = "flex";
            if (score < 150) currentMessage = "Tole boš šel pa še enkrat";
            else if (score > 1000) currentMessage = "To je to, učenci. Lepo!";
            else currentMessage = "Slabo, slabo... poskusi še enkrat.";
            document.getElementById("status-text").innerText = currentMessage;
            document.getElementById("final-score").innerText = `SCORE: ${Math.floor(score)}`;
            document.getElementById("final-score").style.display = "block";
            if (score > highScore) { highScore = Math.floor(score); localStorage.setItem("dinoHiScore", highScore); hiScoreEl.innerText = `HI ${String(highScore).padStart(5, '0')}`; }
        }

        function wrapText(text, x, y, maxWidth, lineHeight) {
            let words = text.split(' '), line = '';
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                if (ctx.measureText(testLine).width > maxWidth && n > 0) { ctx.fillText(line, x, y); line = words[n] + ' '; y += lineHeight; }
                else line = testLine;
            }
            ctx.fillText(line, x, y);
        }

        function drawUIElements() {
            const margin = 12;
            const h = 90; // Slightly taller for bigger text
            const imgW = 110;
            const txtW = canvas.width - imgW - (margin * 4);
            const y = 35;

            // Frame for Image
            ctx.strokeStyle = "#00f2fe"; ctx.lineWidth = 2;
            ctx.strokeRect(margin, y, imgW, h);
            if (imgLoaded) ctx.drawImage(bgImage, margin, y, imgW, h);

            // Frame for Text
            const tx = margin + imgW + margin;
            ctx.fillStyle = "rgba(0, 242, 254, 0.15)";
            ctx.fillRect(tx, y, txtW, h);
            ctx.strokeRect(tx, y, txtW, h);
            
            // Text Styling
            ctx.fillStyle = "#ffff00"; // Neon Yellow for visibility
            ctx.font = "bold 14px Orbitron"; // Bigger and Bolder
            ctx.textAlign = "left";
            wrapText(currentMessage, tx + 10, y + 25, txtW - 15, 18);
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawUIElements();
            
            ctx.strokeStyle = "rgba(0, 242, 254, 0.3)";
            ctx.beginPath(); ctx.moveTo(0, canvas.height * groundY); ctx.lineTo(canvas.width, canvas.height * groundY); ctx.stroke();
            
            dino.y += dino.dy; dino.dy += gravity;
            if (dino.y > canvas.height * groundY - dino.h) { dino.y = canvas.height * groundY - dino.h; dino.dy = 0; dino.grounded = true; }
            ctx.fillStyle = "#00f2fe"; ctx.fillRect(dino.x, dino.y, dino.w, dino.h);

            if (frameCount > 50 && frameCount % 220 === 0) {
                currentMessage = motivationalQuotes[Math.floor(Math.random() * motivationalQuotes.length)];
            }

            if (frameCount > 100 && frameCount % Math.max(50, Math.floor(110 - gameSpeed * 2)) === 0) spawnObstacle();
            
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i]; o.x -= gameSpeed;
                ctx.fillStyle = o.color; ctx.fillRect(o.x, o.y, o.w, o.h * 0.4); 
                ctx.lineWidth = 3; ctx.strokeStyle = o.color; ctx.beginPath();
                ctx.moveTo(o.x + 8, o.y + o.h * 0.4); ctx.lineTo(o.x + 3, o.y + o.h); 
                ctx.moveTo(o.x + o.w - 8, o.y + o.h * 0.4); ctx.lineTo(o.x + o.w - 3, o.y + o.h); ctx.stroke();
                if (dino.x < o.x + o.w && dino.x + dino.w > o.x && dino.y < o.y + o.h && dino.y + dino.h > o.y) gameOver();
                if (o.x < -100) obstacles.splice(i, 1);
            }
            score += 0.15; gameSpeed += 0.001;
            scoreEl.innerText = String(Math.floor(score)).padStart(5, '0');
            frameCount++; if (gameActive) requestAnimationFrame(update);
        }
    </script>
